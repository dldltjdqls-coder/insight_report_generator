name: Daily Insight Report Generator

# 언제 실행할지 지정하는 트리거입니다.
on:
  schedule:
    # 매일 오전 8시 KST (그리니치 표준시 UTC 기준으로는 전날 밤 11시이므로 23:00입니다)
    - cron: '0 23 * * *'
  # 사용자가 직접 깃허브 웹 화면에서 수동으로 '실행 버튼'을 눌러서 즉시 작동시킬 수도 있습니다.
  workflow_dispatch:

# 실행될 환경과 작업을 정의합니다.
jobs:
  generate-report:
    # 우분투(리눅스계열) 최신 버전의 가상 컴퓨터를 빌려 실행합니다.
    runs-on: ubuntu-latest

    # 가상 컴퓨터가 깃허브 저장소(리포지토리)에 완성된 리포트 파일을 직접 업로드(Push)할 수 있도록 권한을 부여합니다.
    permissions:
      contents: write

    steps:
    # 1단계: 깃허브 저장소의 코드(파이썬 스크립트 등)를 가상 컴퓨터로 복사해옵니다.
    - name: 저장소 코드 가져오기 (Checkout)
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    # 2단계: 파이썬(Python 3.10) 가상 작동 환경을 세팅합니다.
    - name: 파이썬(Python) 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3단계: 리포트 생성에 필수적인 외부 라이브러리(패키지)들을 설치합니다.
    - name: 필요한 라이브러리 설치 (Dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml feedparser beautifulsoup4 requests python-dotenv

    # 4단계: 수집 및 AI 리포트 생성 코드를 실제로 돌립니다.
    # 이때 깃허브 비밀 상자(Secrets)에 넣어둔 GEMINI_API_KEY를 안전하게 가져와 주입해 줍니다.
    - name: 리포트 생성 프로그램 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python generate_report.py

    # 5단계: 오늘 새로 만들어진 리포트 파일(.md, .html)을 검사한 후, 변경사항이 있다면 저장소에 자동으로 커밋 및 저장(Push)합니다.
    - name: 생성된 리포트 파일 깃허브에 자동 저장 (Commit and Push)
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        # reports 폴더와 루트 index.html 파일을 추가 대상에 넣습니다.
        git add reports/ index.html
        
        # 만약 새로 바뀐 파일이 전혀 없다면 푸시를 생략하고, 변경 사항이 있는 경우에만 커밋 및 푸시를 수행합니다.
        if git diff --staged --quiet; then
          echo "No new reports generated today."
        else
          git commit -m "docs: Auto-generate Daily Insight Report for $(date +'%Y-%m-%d')"
          git push
        fi
