# ==============================================================================
# 투자/산업 인사이트 리포트 생성 자동화 프로젝트 - 설정 파일 (sources.yaml)
# ==============================================================================
# 이 파일은 크롤링할 네이버 블로그 목록, 매일 검색할 뉴스 키워드, 그리고 리포트 생성
# 관련 설정을 관리하는 파일입니다. 필요에 따라 항목을 자유롭게 수정/추가할 수 있습니다.

# ------------------------------------------------------------------------------
# 1. 블로그 설정 (blogs)
#    - name: 블로거명 (리포트에 식별자로 사용됨)
#    - rss: 네이버 블로그 RSS 피드 주소 (형식: https://rss.blog.naver.com/아이디)
#    - focus: 해당 블로거가 주로 다루는 전문 분야 (분석 및 분류 시 활용)
# ------------------------------------------------------------------------------
blogs:
  - name: "모소밤부"
    rss: "https://rss.blog.naver.com/bambooinvesting"
    focus: "글로벌 매크로 경제, 미국 주식, 기업 분석 및 가치투자"

  - name: "메르"
    rss: "https://rss.blog.naver.com/ranto28"
    focus: "거시경제, 지정학적 이슈, 경제사, 반도체 및 차세대 산업 트렌드"

  - name: "머지노"
    rss: "https://rss.blog.naver.com/aplus0418"
    focus: "국내외 거시경제 흐름, 부동산 시장 전망, 개별 기업 투자 아이디어"

# ------------------------------------------------------------------------------
# 2. 뉴스 검색 키워드 설정 (news_keywords)
#    - 매일 아침 뉴스를 검색하고 트렌드를 분석할 핵심 키워드 리스트입니다.
# ------------------------------------------------------------------------------
news_keywords:
  - "인공지능 반도체"
  - "연준 기준금리"
  - "글로벌 공급망 지정학"
  - "전기차 배터리 시장"
  - "빅테크 실적 및 주가 전망"

# ------------------------------------------------------------------------------
# 3. 리포트 생성 설정 (report_settings)
#    - language: 리포트 작성 언어 (기본값: Korean)
#    - report_time: 매일 아침 리포트가 발송/생성될 타겟 시간 (형식: HH:MM Timezone)
#    - output_folder: 생성된 리포트 파일(.md, .pdf 등)이 저장될 폴더 경로
# ------------------------------------------------------------------------------
report_settings:
  language: "Korean"
  report_time: "08:00 Asia/Seoul"
  output_folder: "reports"
